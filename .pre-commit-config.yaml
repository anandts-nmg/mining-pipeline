repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # rev pins are kept in step with the ruff/mypy versions CI + the dev venv actually run
  # (see pyproject [project.optional-dependencies].dev); refresh with `pre-commit autoupdate`.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - types-PyYAML
          - pandas-stubs>=2.1
        args: ["--config-file=pyproject.toml"]
        files: ^src/
