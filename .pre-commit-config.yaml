repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Keep this Ruff rev aligned with the exact dev dependency used by CI and the editor
  # (see pyproject [project.optional-dependencies].dev).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Use the pinned ty installed by `pip install -e ".[dev]"`. A local/system hook
  # avoids uv-managed lockfile, virtual-environment, dependency, and network side effects.
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
