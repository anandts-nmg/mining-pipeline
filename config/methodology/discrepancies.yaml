format_version: 1.2.0
# Append-only methodology decision register. Complete history — unresolved, resolved,
# superseded, and withdrawn records. Resolved history is never erased; a later issue
# gets a new linked record instead of reopening one. Historical records migrated from
# the deleted METHODOLOGY_DISCREPANCIES.md carry a migration_source and use the
# explicit marker "historical-unknown" where an approver or date was not recorded.
discrepancies:
  - discrepancy_id: METH-DISC-001
    subject: methodology-input-count
    compared_sources:
      - methodology.master-v9
      - config/input_register.csv
    statement: The methodology identifies 78 inputs while the registered repository input set contains 79.
    operational_impact: Do not change registered raw identity or silently discard either count.
    status: resolved
    resolution: Adopt 79 registered inputs — the 78 methodology inputs plus the reconciled SAS hand-interpreted 1-to-25k geology scan registered as input 79.
    rationale: Doc-versus-disk count drift; the 79th file exists in the canonical archive and was never added to the master document. Physical reality is reconciled by filename plus pinned Drive file ID, never by count or folder name.
    approver: historical-unknown
    resolved_on: historical-unknown
    effective_version: v0.1.0
    implementation_evidence: config/input_register.csv rows 1-79 (evidence group 05 count 17); verified go/go on the real archive at tag v0.1.0.
    migration_source: METHODOLOGY_DISCREPANCIES.md (doc-vs-reality, 78-vs-79)
  - discrepancy_id: METH-DISC-002
    subject: methodology-version-label
    compared_sources:
      - methodology.master-v9 filename
      - methodology.master-v9 internal heading
    statement: The repository filename identifies v9 while the internal methodology heading identifies v8.
    operational_impact: Version labels alone do not establish authority.
    status: unresolved
    proposed_resolution: Confirm the authoritative edition label with the methodology owner and record it in the authority registry.
    required_approver: methodology-owner
    remaining_actions:
      - Confirm the authoritative version label for the v8/v9 edition with the methodology owner.
  - discrepancy_id: METH-DISC-003
    subject: phase04-delineation-method
    compared_sources:
      - phase04.guide
      - src/buduunkhad/phases/phase04_prospect_ranking.py
    statement: Phase 04 methodology describes hand-drawn geological polygons while the current implementation uses a fixed evidence grid.
    operational_impact: Retain the fixed-grid implementation until a separately approved migration replaces it.
    status: unresolved
    proposed_resolution: No proposal recorded — replacing the fixed grid with hand-drawn or model-assisted delineation would require a separately approved migration.
    required_approver: methodology-owner
    remaining_actions:
      - Decide whether hand-drawn delineation ever replaces or complements the fixed evidence grid.
  - discrepancy_id: METH-DISC-004
    subject: phase05-implementation-status
    compared_sources:
      - phase05.guide
      - src/buduunkhad/phases/phase05_drone_lidar.py
    statement: Phase 05 has detailed methodology while the current implementation remains a registered stub.
    operational_impact: Do not infer operational thresholds or claim Phase 05 implementation.
    status: unresolved
    proposed_resolution: No proposal recorded — Phase 05 build awaits the drone campaign data and a scoped implementation task.
    required_approver: project-owner
    remaining_actions:
      - Schedule the Phase 05 build once drone LiDAR data and build capacity are available.
  - discrepancy_id: METH-DISC-005
    subject: phase02-weighted-score-input-authority
    compared_sources:
      - phase02.guide
      - src/buduunkhad/phases/phase02_remote_sensing.py
    statement: The historical weighted Phase 02 score depends on structure and lithology inputs whose derivations are not established in the adopted repository contracts.
    operational_impact: Retain the formula as a non-automated historical reference and do not make it authoritative until its input derivations are approved.
    status: unresolved
    proposed_resolution: Obtain approved derivations for the structure_v1 and lithology inputs, or formally retire the v5 weighted score from the methodology.
    required_approver: methodology-owner
    remaining_actions:
      - Obtain or retire the undocumented structure_v1 and lithology input derivations.
    migration_source: METHODOLOGY_DISCREPANCIES.md (02-3 residual follow-up; parent decision METH-DISC-020)
  - discrepancy_id: METH-DISC-006
    subject: phase04-versus-final-ranking-criteria
    compared_sources:
      - phase04.guide
      - methodology.master-v9
      - src/buduunkhad/phases/phase04_prospect_ranking.py
    statement: The master v9 section-5 lifecycle scoring matrix (with field-pXRF and drone criteria) differs from the Phase-4 guide section-6 desktop matrix.
    operational_impact: Preserve the adopted Phase 04 desktop matrix and do not import final-ranking criteria without an approved migration.
    status: resolved
    resolution: Adopt the Phase-4 guide section-6 desktop matrix for Phase 04 (geology 20, occurrence 15, geochem 20, remote sensing 15, structure 10, deposit-model fit 10, access 5, confidence 5). The master v9 section-5 lifecycle matrix is reserved for the Phase 10 final integrated target ranking where field, pXRF, and drone evidence exists.
    rationale: The later per-phase deep-dive guide is the phase authority (the same rule applied for 01-1, 02-2, and 03-1). The v9 lifecycle criteria cannot score at desktop and would cap every desktop prospect at class B, contradicting the reference outputs.
    approver: historical-unknown
    resolved_on: "2026-07-06"
    effective_version: v0.6.0
    implementation_evidence: PROSPECT_CRITERIA in src/buduunkhad/phases/phase04_prospect_ranking.py; model-fit scored from the human-completed 03A matrix; discrete A/B/C class-band delineation.
    migration_source: METHODOLOGY_DISCREPANCIES.md (04-1)
