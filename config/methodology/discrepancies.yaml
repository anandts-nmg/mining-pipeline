  - discrepancy_id: METH-DISC-020
    subject: aster-alteration-scoring-scheme
    compared_sources:
      - phase02.guide section 8.5 (workflow v5 weighted score)
      - phase02.aster-sop
    statement: The Phase-2 guide prescribes a 15-component weighted porphyry score with undocumented component formulas and two non-spectral inputs, while the geologist's later QGIS SOP defines a fully specified alternative — seven band-ratio indices, per-scene mean plus 1.5-sigma anomaly binaries, and a four-component weighted target score (2 x clay + ferric + chlorite + silica; polygons at score 3 or more and at least 0.5 ha).
    operational_impact: Only one scheme is reproducible end-to-end; the automated chain must implement exactly one.
    status: resolved
    resolution: Automate the SOP scheme; retain the v5 weighted formula in the ASTER method note for reference only.
    rationale: The later, more specific operator recipe is the phase authority (same rule as 01-1, 02-2, 03-1) and it is the only fully reproducible scheme — it produced the geologist's reference outputs.
    approver: historical-unknown
    resolved_on: "2026-07-07"
    effective_version: v0.7.0
    implementation_evidence: core/aster.py and the Phase 02 input-73 branch; georeferencing verified pixel-identical to the geologist's QGIS band exports; index rasters agree with the reference at correlation about 0.92-0.98.
    remaining_actions:
      - The v5 weighted score's undocumented inputs remain an open follow-up tracked as METH-DISC-005.
    migration_source: METHODOLOGY_DISCREPANCIES.md (02-3)
  - discrepancy_id: METH-DISC-021
    subject: aster-threshold-statistics-basis
    compared_sources:
      - phase02.aster-sop text (implies full-scene statistics)
      - the geologist's reference outputs (licence-clipped threshold basis)
    statement: The SOP text implies full-scene statistics for the mean plus 1.5-sigma anomaly thresholds, but the reference outputs were thresholded on licence-clipped rasters (binary extents match the 5 km buffer to within a pixel).
    operational_impact: The threshold basis changes which pixels are flagged anomalous.
    status: resolved
    resolution: Compute statistics from the licence-area subset (the 5 km buffer AOI) and apply the threshold full-scene; record the basis per row in the ASTER anomaly-threshold register.
    rationale: Matches the geologist's actual practice while keeping district context; recorded as decided with the project user on 2026-07-07.
    approver: historical-unknown
    resolved_on: "2026-07-07"
    effective_version: v0.7.0
    implementation_evidence: ASTER anomaly-threshold register rows record the statistics basis; core/aster.py implements the licence-AOI basis.
    migration_source: METHODOLOGY_DISCREPANCIES.md (02-3 threshold-basis sub-decision)
