format_version: 1.0.0
phase_id: "02"
requirements:
  - requirement_id: P02-RASTER-MATH-001
    statement: Reprojection, clipping, spectral arithmetic, masks and terrain measurements remain deterministic.
    source_refs: [repository.methodology-contracts, methodology.master-v9, phase02.guide, METH-DISC-019, METH-DISC-025]
    status: adopted
  - requirement_id: P02-ASTER-AUTHORITY-GAP-001
    statement: The exact master and frozen repository contract govern the ASTER sequence; generated derivatives remain provisional support evidence and unavailable for authoritative downstream use until METH-READY-003 technical validation is complete.
    source_refs: [methodology.master-v9, repository.methodology-contracts, phase02.aster-sop, METH-DISC-020, METH-DISC-021, METH-DISC-034, METH-DISC-056, METH-DISC-063]
    status: adopted
  - requirement_id: P02-SENTINEL-INPUT-001
    statement: The registered received Sentinel composites and ratio products follow the master's received-derivative branch; automation is limited to validated operations supported by those exact inputs and never claims raw-band preprocessing.
    source_refs: [methodology.master-v9, repository.methodology-contracts, phase02.sentinel-qgis402-guide, METH-DISC-035, METH-DISC-064]
    status: adopted
  - requirement_id: P02-BASEMAP-REFERENCE-001
    statement: The basemap operator guide is a Phase 02 reference only; phase02_processing.yaml fixes input 75 as full-extent visual context and input 76 as 1 km clipped visual context.
    source_refs: [methodology.master-v9, repository.methodology-contracts, phase02.basemap-qgis402-guide, METH-DISC-036, METH-DISC-052, METH-DISC-065]
    status: adopted
  - requirement_id: P02-DEM-PARAMETERS-001
    statement: phase02_processing.yaml freezes the implemented DEM profiles as reproducible support evidence; none of their parameters is a mineralization or field-decision threshold.
    source_refs: [methodology.master-v9, repository.methodology-contracts, phase02.dem-qgis402-guide, METH-DISC-053]
    status: adopted
  - requirement_id: P02-READINESS-QAQC-001
    statement: ASTER HDF remains provisional and blocked from authoritative downstream use, while KOMPSAT remains excluded under automation_readiness.yaml; other Phase 02 datasets may proceed with those gaps recorded.
    source_refs: [methodology.master-v9, repository.methodology-contracts, METH-DISC-049, METH-DISC-056]
    status: adopted
  - requirement_id: P02-AI-INTERPRET-001
    statement: AI interpretations of validated imagery remain draft support evidence.
    source_refs: [repository.methodology-contracts, phase02.guide]
    status: adopted
  - requirement_id: P02-WEIGHTED-SCORE-DEFERRED-001
    statement: The historical weighted score is retired as a non-authoritative reference; Phase 02 emits only individually derived measurements with explicit input and formula provenance.
    source_refs: [repository.methodology-contracts, METH-DISC-005, METH-DISC-061]
    status: adopted
