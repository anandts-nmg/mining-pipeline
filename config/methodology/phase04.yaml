format_version: 1.0.0
phase_id: "04"
requirements:
  - requirement_id: P04-PROPOSAL-ONLY-001
    statement: AI may propose prospect geometry, rationale and limitations but cannot publish or approve it.
    source_refs: [repository.methodology-contracts, phase04.guide]
    status: adopted
  - requirement_id: P04-LEGACY-COMPARATOR-001
    statement: The fixed-grid evidence method remains unchanged as a legacy comparator; the master-aligned target is the separately specified human-reviewed prospect-polygon workflow in phase04_migration.yaml.
    source_refs: [methodology.master-v9, repository.methodology-contracts, phase04.guide, METH-DISC-003, METH-DISC-041, METH-DISC-060, METH-DISC-068]
    status: adopted
  - requirement_id: P04-SCORING-MATRIX-PRESERVATION-001
    statement: The implemented Phase 04 desktop criterion weights remain an unchanged binary/full-weight legacy comparator; phase04_migration.yaml specifies the future ranged prospect-level contract, while the master lifecycle matrix stays reserved for Phase 10.
    source_refs: [repository.methodology-contracts, phase04.guide, METH-DISC-006, METH-DISC-041, METH-DISC-068]
    status: adopted
  - requirement_id: P04-AI-ISOLATION-001
    statement: AI_DRAFT, AI_VALIDATED, HUMAN_REVIEWED, ACCEPTED_EVIDENCE and GEOLOGIST_APPROVED handoff records remain outside Phase 04 until an explicit authoritative adapter is adopted.
    source_refs: [repository.methodology-contracts]
    status: adopted
  - requirement_id: P04-EVIDENCE-AUTHORITY-001
    statement: Attribute-bearing evidence used by the legacy comparator must resolve through an immutable manifest and catalog admission event with an exact source artifact, layer, explicit evidence role and legacy-comparator eligibility; filename keywords and directory proximity have no authority.
    source_refs: [repository.methodology-contracts, methodology.master-v9]
    status: adopted
  - requirement_id: P04-GATE-PROVISIONAL-001
    statement: Automated completion does not imply scientific approval; Phase 03 master-required pending items block its handoff, while other deterministic scaffold gates retain explicit provisional behavior.
    source_refs: [repository.methodology-contracts, METH-DISC-031, METH-DISC-062]
    status: adopted
