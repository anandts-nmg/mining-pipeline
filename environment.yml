# Conda environment for the Buduunkhad / XV-023222 exploration pipeline.
#
# GDAL, rasterio, geopandas and fiona are far easier to install via conda-forge
# than via pip on some platforms, which is why this file exists alongside the
# pip-installable pyproject.toml. After creating the env, install the package
# itself in editable mode:
#
#     conda env create -f environment.yml
#     conda activate buduunkhad
#     pip install -e ".[dev]"
#
name: buduunkhad
channels:
  - conda-forge
dependencies:
  - python=3.11
  - gdal>=3.8
  - rasterio>=1.3
  - geopandas>=0.14
  - fiona>=1.9
  - shapely>=2.0
  - pyproj>=3.6
  - numpy>=1.26
  - pandas>=2.1
  - openpyxl>=3.1
  - python-docx>=1.1
  - pydantic>=2.7
  - pyyaml>=6.0
  - typer>=0.12
  # --- dev ---
  - pytest>=8.0
  - python-build>=1.2,<2.0
  - ruff>=0.5
  - mypy>=1.10
  - pre-commit>=3.7
  # --- optional, for Phase 02 DEM derivatives ---
  - richdem
  - whitebox_tools
